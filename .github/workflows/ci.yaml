---
name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Build Docker images
        run: docker compose build --pull
      - name: Start services
        run: docker compose up -d --wait
      - name: Wait for services to be ready
        run: sleep 30
      - name: Check containers health
        run: docker compose ps
      - name: Check HTTP reachability
        run: curl -v --fail-with-body http://localhost:9080 || true
      - name: Run migrations
        run: docker compose exec -T php bin/console doctrine:migrations:migrate --no-interaction || true
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Lint Code Base
        uses: super-linter/super-linter/slim@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_CHECKOV: false
          VALIDATE_TRIVY: false
          # Disable some validators to reduce noise
          VALIDATE_JSCPD: false
          VALIDATE_CSS: false
          VALIDATE_NATURAL_LANGUAGE: false
